name: Chored
options:
  bundleIdPrefix: com.yourcompany
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    # Set your Apple Developer Team ID here to enable CloudKit/push/App Groups.
    # Leaving it blank still builds and runs locally (local-only mode).
    DEVELOPMENT_TEAM: ""

targets:

  Chored:
    type: application
    platform: iOS
    sources:
      - path: Chored
        excludes:
          - "Resources/Info.plist"
          - "Resources/Chored.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.chored
        INFOPLIST_FILE: Chored/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Chored/Resources/Chored.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: ChoreWidgetExtension
        embed: true

  ChoreWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      # Widget code plus the shared Core layer (Models, Services, Repositories,
      # Persistence, Utilities). Deliberately excludes App / Features /
      # DesignSystem per the separation rules.
      - path: ChoreWidget
        excludes:
          - "Info.plist"
          - "ChoreWidget.entitlements"
      - path: Chored/Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.chored.ChoreWidget
        INFOPLIST_FILE: ChoreWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: ChoreWidget/ChoreWidget.entitlements
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
